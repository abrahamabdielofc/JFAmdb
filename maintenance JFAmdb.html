<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Maintenance - Jogja Film Academy</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* --- BACKGROUND CINEMATIC EFFECT --- */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            /* Animated Gradient Hitam-Merah */
            background: linear-gradient(135deg, #0a0000, #1a0202, #320303, #0a0000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Aurora Efek Merah */
        .aurora {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(229, 9, 20, 0.15), transparent 60%);
            filter: blur(60px);
            opacity: 0.8;
            animation: auroraAnimate 20s linear infinite;
            transform-origin: center center;
            pointer-events: none;
        }

        @keyframes auroraAnimate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Canvas untuk 100+ Partikel */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Cinematic Noise Overlay & Vignette */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
        }

        /* --- MAIN INTERFACE CONTENT --- */
        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
            margin: auto;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating Logo JFA */
        .logo-wrapper {
            margin-bottom: 30px;
            display: inline-block;
            animation: floatingLogo 4s ease-in-out infinite;
        }

        @keyframes floatingLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .logo-placeholder {
            width: 90px;
            height: 90px;
            fill: #e50914;
            filter: drop-shadow(0 0 15px rgba(229, 9, 20, 0.6));
        }

        /* Typography */
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #f5a6a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #a0a0a0;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Maintenance Badge Status */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(229, 9, 20, 0.1);
            border: 1px solid rgba(229, 9, 20, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ff4d4d;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #e50914;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 8px #e50914;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Realtime Clock & Date */
        .datetime-container {
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .time {
            font-size: 2.5rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .date {
            font-size: 0.9rem;
            font-weight: 400;
            color: #888888;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Progress Bar Animation */
        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #990000, #e50914, #ff4d4d);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.8);
            animation: fillProgress 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            30% { width: 45%; }
            60% { width: 70%; }
            85% { width: 95%; }
            100% { width: 100%; }
        }

        /* --- FOOTER STYLES --- */
        footer {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 30px 20px;
            text-align: center;
        }

        .footer-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 2px;
            line-height: 1.8;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
        }

        .footer-link span {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .footer-link:hover span {
            color: #e50914;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1rem;
                letter-spacing: 3px;
                margin-bottom: 30px;
            }
            .time {
                font-size: 2rem;
            }
            .date {
                font-size: 0.8rem;
            }
            .logo-placeholder {
                width: 75px;
                height: 75px;
            }
            .footer-link {
                font-size: 0.68rem;
                letter-spacing: 1.5px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            .main-content {
                padding: 20px 15px;
            }
            .datetime-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Layer Elements -->
    <div class="bg-container">
        <div class="aurora"></div>
        <canvas id="particleCanvas"></canvas>
    </div>
    <div class="noise-overlay"></div>
    <div class="vignette"></div>

    <!-- Main Maintenance View Box -->
    <main class="main-content">
        <!-- Floating Brand Lo go Wrapper -->
        <div class="logo-wrapper">
            <!-- PENTING: Jika menggunakan file gambar lokal, ganti tag <svg> ini dengan:
                 <img src="https://blogger.googleusercontent.com/img/a/AVvXsEhvDi64laeIfPII8TCpnjxueiMmAUGpzyB0vWWKby_8ZAbm2x6CyVOJt0rMwsNre4WLzDTK1Bx3lfuZQuO7BPRKVl_LoYYIivGnzQ1nIguIb-CzJxQrs6M0GcbIs2CHqqvLlO1gRV9pRodAXJBmaJZY9AQq6WVQ7rIYAS3ATmkx2Oayu7LSF2sSroXxnvof" alt="Logo JFA" class="logo-placeholder"> -->
            <img class="logo-placeholder" src="https://blogger.googleusercontent.com/img/a/AVvXsEhvDi64laeIfPII8TCpnjxueiMmAUGpzyB0vWWKby_8ZAbm2x6CyVOJt0rMwsNre4WLzDTK1Bx3lfuZQuO7BPRKVl_LoYYIivGnzQ1nIguIb-CzJxQrs6M0GcbIs2CHqqvLlO1gRV9pRodAXJBmaJZY9AQq6WVQ7rIYAS3ATmkx2Oayu7LSF2sSroXxnvof" alt="Logo JFA" viewBox="0 0 100 100" xmlns="https://blogger.googleusercontent.com/img/a/AVvXsEhvDi64laeIfPII8TCpnjxueiMmAUGpzyB0vWWKby_8ZAbm2x6CyVOJt0rMwsNre4WLzDTK1Bx3lfuZQuO7BPRKVl_LoYYIivGnzQ1nIguIb-CzJxQrs6M0GcbIs2CHqqvLlO1gRV9pRodAXJBmaJZY9AQq6WVQ7rIYAS3ATmkx2Oayu7LSF2sSroXxnvof">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#e50914" stroke-width="2" stroke-dasharray="6 4"/>
                <path d="M35 35 H65 M50 35 V65 M40 65 H55" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M38 45 C 38 45, 45 55, 50 55 C 55 55, 62 45, 62 45" stroke="#e50914" stroke-width="3" stroke-linecap="round" fill="none"/>
            </img>
        </div>

        <br>
        
        <!-- Live System Status Badge -->
        <div class="status-badge">
            <span class="status-dot"></span>
            System Maintenance Underway
        </div>

        <!-- Main Captions -->
        <h1>JFAmdb Maintenance</h1>
        <div class="subtitle">See you soon.</div>

        <!-- Realtime Digital Clock Widget -->
        <div class="datetime-container">
            <div class="time" id="liveTime">00:03:00</div>
            <div class="date" id="liveDate">Kamis, 19 Juli 2026</div>
        </div>

        <!-- Progress Loader Animation Bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </main>

    <!-- Footer Redirect Navigation Block -->
    <footer>
        <a href="https://afy.ac.id" target="_blank" rel="noopener noreferrer" class="footer-link">
            © 2026 COPYRIGHT HIMAFISI SURYAKANTA,<br>
            <span>JOGJA FILM ACADEMY</span>
        </a>
    </footer>

    <!-- --- JAVASCRIPT ENGINE --- -->
    <script>
        // --- 1. REALTIME ENGINE (CLOCK & DATE) ---
        function updateDateTime() {
            const now = new Date();
            
            // Format Jam (HH:MM:SS) dengan Leading Zero
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('liveTime').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format Tanggal Bahasa Indonesia Lokal
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const localDate = now.toLocaleDateString('id-ID', options);
            document.getElementById('liveDate').textContent = localDate;
        }
        
        // Eksekusi berkala setiap detik
        setInterval(updateDateTime, 1000);
        updateDateTime(); // Panggilan inisiasi pertama


        // --- 2. CANVAS ENGINE (100+ FLOATING PARTICLES) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 120; // Konfigurasi jumlah partikel (100+)

        // Set & Sesuaikan Ukuran Canvas secara dinamis mengikuti Display
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', () => {
            setCanvasSize();
            initParticles(); // Re-inisiasi letak partikel jika window berubah ukuran
        });

        // Blueprint Object Partikel Sinematik
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5; // Ukuran bervariasi tipis
                this.speedX = Math.random() * 0.4 - 0.2; // Gerakan horizontal lambat
                this.speedY = Math.random() * -0.6 - 0.1; // Selalu bergerak translasi ke atas
                this.opacity = Math.random() * 0.5 + 0.2; // Opacity acak transparan
                this.fadeDirection = Math.random() > 0.5 ? 0.005 : -0.005; // Efek kedip alami
            }

            // Update Kalkulasi Posisi dan Opacity Partikel
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Jika melompat keluar batas atas layar, reset ke bawah layar
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
                // Jika melompat keluar batas kiri/kanan layar
                if (this.x < 0 || this.x > canvas.width) {
                    this.speedX = -this.speedX;
                }

                // Efek Fading Luminositas Partikel (Blinking Effect)
                this.opacity += this.fadeDirection;
                if (this.opacity > 0.7 || this.opacity < 0.1) {
                    this.fadeDirection = -this.fadeDirection;
                }
            }

            // Menggambar Partikel ke Canvas
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Menggunakan basis warna merah pudar sinematik
                ctx.fillStyle = `rgba(229, 9, 20, ${this.opacity})`;
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = '#e50914';
                ctx.fill();
            }
        }

        // Pengisian Awal Array dengan Instance Partikel
        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }
        initParticles();

        // Loop Animasi Canvas Berkelanjutan (Render Loop)
        function animateParticles() {
            // Bersihkan Canvas secara transparan per frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0; // Reset shadow default global agar tidak berat
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
